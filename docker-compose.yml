services:
  redis:
    image: redis:7-alpine
    container_name: ai-code-review-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      target: development
    container_name: ai-code-review-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev
    depends_on:
      - redis

volumes:
  backend_node_modules: